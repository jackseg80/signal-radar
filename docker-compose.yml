services:
  scanner:
    build: .
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Zurich}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "9000:8000"
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Zurich}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    restart: unless-stopped
    depends_on:
      - scanner
