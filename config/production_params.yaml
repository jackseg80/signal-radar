notes:
  - "Paper trading mode -- position_fraction=1.0 pour chaque trade"
  - "Capital $5k -- chaque trade utilise 100% du capital (pas de compounding)"
  - "Univers = VALIDATED assets uniquement (VALIDATION_RESULTS.md)"
  - "Watchlist = CONDITIONAL assets"
  - "max_positions=1 par strategie (evite sur-allocation TOM)"
  - "Univers tries par PF desc -- priorite au meilleur asset"
  - "Necessite compte USD sur Saxo (FX 0.25%/trade tue l'edge)"
