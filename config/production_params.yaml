capital: 5000
whole_shares: true

strategies:
  rsi2:
    enabled: true
    max_positions: 1
    params:
      rsi_period: 2
      rsi_entry_threshold: 10.0
      sma_trend_period: 200
      sma_exit_period: 5
      sma_trend_buffer: 1.01
      position_fraction: 1.0
    universe:  # sorted by PF desc (VALIDATION_RESULTS.md)
      - META     # PF 3.49
      - GOOGL    # PF 1.72
      - MSFT     # PF 1.66
      - NVDA     # PF 1.48
      - V
      - MA
      - AVGO
      - AAPL
      - ADBE
    watchlist:
      - UNH
      - GE
      - AMZN
    fee_model: us_stocks_usd_account

  ibs:
    enabled: true
    max_positions: 1
    params:
      ibs_entry_threshold: 0.2
      ibs_exit_threshold: 0.8
      sma_trend_period: 200
      position_fraction: 1.0
    universe:  # sorted by PF desc (VALIDATION_RESULTS.md)
      - NVDA     # PF 2.07
      - META     # PF 1.68
      - MSFT     # PF 1.52
      - AAPL     # PF 1.51
      - AMZN     # PF 1.46
      - GOOGL    # PF 1.29
      - V
      - AVGO
      - MA
      - ADBE
      - CSCO
    watchlist:
      - PYPL
      - AMD
    fee_model: us_stocks_usd_account

  tom:
    enabled: true
    max_positions: 1
    params:
      entry_days_before_eom: 5
      exit_day_of_new_month: 3
      position_fraction: 1.0
    universe:
      - META      # PF 1.89
      - NFLX      # PF 1.79
      - COST      # PF 1.66
      - TSLA      # PF 1.53
      - ORCL      # PF 1.52
      - LLY       # PF 1.51
      - AVGO      # PF 1.45
      - V         # PF 1.44
      - AAPL      # PF 1.40
      - WMT       # PF 1.40
      - MA        # PF 1.37
      - HD        # PF 1.36
      - ADBE      # PF 1.31
      - NVDA      # PF 1.29
      - AMZN      # PF 1.29
      - UNH       # PF 1.28
      - MSFT      # PF 1.23
