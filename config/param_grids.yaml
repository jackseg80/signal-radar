# Grille réduite : 12 combos (ratio combos/trades gérable)
# Donchian 50/20 classique (Turtle), on optimise seulement
# le filtre ADX, le trailing mult et le SL.
signal_donchian:
  wfo:
    is_days: 756        # 3 ans (3 × 252 trading days)
    oos_days: 252       # 1 an
    step_days: 126      # 6 mois
    embargo_days: 1
  default:
    entry_mode: ["donchian"]
    donchian_entry_period: [50]
    donchian_exit_period: [20]
    adx_period: [14]
    adx_threshold: [0, 20]
    atr_period: [14]
    trailing_atr_mult: [3.0, 4.0, 5.0]
    exit_mode: ["trailing"]
    sl_percent: [8.0, 10.0]
    position_fraction: [0.3]
    cooldown_candles: [3]
    # sides défini par asset_class, pas ici

